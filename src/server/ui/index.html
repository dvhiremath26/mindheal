<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindHeal - Review Dashboard</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2333;
    --bg-card: #1c2333;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-purple: #8b5cf6;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-orange: #db6d28;
    --gradient-start: #8b5cf6;
    --gradient-end: #3b82f6;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */

  .header {
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(139, 92, 246, 0.3);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    font-size: 32px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .brand h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .brand h1 span {
    font-weight: 300;
    opacity: 0.85;
  }

  /* ── Stats Cards ────────────────────────────────────────────────────── */

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    text-align: center;
    min-width: 100px;
    transition: transform var(--transition);
  }

  .stat-card:hover { transform: translateY(-2px); }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.85;
    color: #fff;
  }

  /* ── Progress Bar ───────────────────────────────────────────────────── */

  .progress-wrapper {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 32px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-text {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .progress-bar {
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── Bulk Actions ───────────────────────────────────────────────────── */

  .bulk-actions {
    max-width: 1400px;
    margin: 20px auto;
    padding: 0 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent-purple); background: var(--bg-tertiary); }
  .btn:active { transform: scale(0.97); }

  .btn-approve { border-color: var(--accent-green); color: var(--accent-green); }
  .btn-approve:hover { background: rgba(63, 185, 80, 0.15); }

  .btn-reject { border-color: var(--accent-red); color: var(--accent-red); }
  .btn-reject:hover { background: rgba(248, 81, 73, 0.15); }

  .btn-confidence { border-color: var(--accent-yellow); color: var(--accent-yellow); }
  .btn-confidence:hover { background: rgba(210, 153, 34, 0.15); }

  .btn-sm { padding: 6px 14px; font-size: 13px; }

  .btn-solid-approve {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #fff;
  }
  .btn-solid-approve:hover { background: #2ea043; border-color: #2ea043; }

  .btn-solid-reject {
    background: var(--accent-red);
    border-color: var(--accent-red);
    color: #fff;
  }
  .btn-solid-reject:hover { background: #da3633; border-color: #da3633; }

  .btn-solid-edit {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }
  .btn-solid-edit:hover { background: #4090e0; border-color: #4090e0; }

  /* ── Cards Container ────────────────────────────────────────────────── */

  .cards-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px 64px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Heal Card ──────────────────────────────────────────────────────── */

  .heal-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all var(--transition);
    box-shadow: var(--shadow-sm);
  }

  .heal-card:hover {
    border-color: rgba(139, 92, 246, 0.4);
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
  }

  .heal-card.approved { border-left: 3px solid var(--accent-green); }
  .heal-card.rejected { border-left: 3px solid var(--accent-red); opacity: 0.7; }
  .heal-card.pending { border-left: 3px solid var(--accent-yellow); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 24px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }

  .card-file {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-file a {
    color: var(--accent-blue);
    text-decoration: none;
    word-break: break-all;
  }

  .card-file a:hover { text-decoration: underline; }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .card-badges {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .badge-confidence-high { background: rgba(63, 185, 80, 0.2); color: var(--accent-green); }
  .badge-confidence-mid { background: rgba(210, 153, 34, 0.2); color: var(--accent-yellow); }
  .badge-confidence-low { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); }

  .badge-strategy {
    background: rgba(139, 92, 246, 0.15);
    color: var(--accent-purple);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .badge-status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-status.approved { background: rgba(63, 185, 80, 0.2); color: var(--accent-green); }
  .badge-status.rejected { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); }
  .badge-status.pending  { background: rgba(210, 153, 34, 0.2); color: var(--accent-yellow); }

  /* ── Diff View ──────────────────────────────────────────────────────── */

  .diff-section {
    padding: 0 24px 16px;
  }

  .diff-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 13px;
  }

  .diff-panel {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    overflow-x: auto;
    word-break: break-all;
  }

  .diff-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .diff-original {
    color: var(--accent-red);
    text-decoration: line-through;
    opacity: 0.85;
  }

  .diff-healed {
    color: var(--accent-green);
    background: rgba(63, 185, 80, 0.08);
    padding: 2px 4px;
    border-radius: 3px;
  }

  /* ── Collapsible Details ────────────────────────────────────────────── */

  .card-details {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
  }

  .details-toggle {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    transition: color var(--transition);
  }

  .details-toggle:hover { color: var(--text-primary); }

  .details-toggle .arrow {
    display: inline-block;
    transition: transform var(--transition);
    font-size: 10px;
  }

  .details-toggle.open .arrow { transform: rotate(90deg); }

  .details-content {
    display: none;
    margin-top: 12px;
  }

  .details-content.open { display: block; }

  .detail-row {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .detail-label {
    color: var(--text-muted);
    min-width: 100px;
    flex-shrink: 0;
  }

  .detail-value {
    color: var(--text-secondary);
    word-break: break-all;
  }

  .dom-preview {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-top: 8px;
    font-family: monospace;
    font-size: 12px;
    color: var(--text-secondary);
    max-height: 200px;
    overflow: auto;
    white-space: pre-wrap;
  }

  /* ── Card Actions ───────────────────────────────────────────────────── */

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }

  .card-actions .spacer { flex: 1; }

  /* ── Edit Locator Inline ────────────────────────────────────────────── */

  .edit-input-wrapper {
    display: none;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .edit-input-wrapper.active { display: flex; }

  .edit-input {
    flex: 1;
    background: var(--bg-primary);
    border: 1px solid var(--accent-blue);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    color: var(--text-primary);
    font-family: monospace;
    font-size: 13px;
    outline: none;
  }

  .edit-input:focus { box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3); }

  /* ── Toast Notifications ────────────────────────────────────────────── */

  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1000;
    pointer-events: none;
  }

  .toast {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    pointer-events: auto;
  }

  .toast-success { background: var(--accent-green); }
  .toast-error   { background: var(--accent-red); }
  .toast-info    { background: var(--accent-blue); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(16px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-8px) scale(0.95); }
  }

  /* ── Completion Overlay ─────────────────────────────────────────────── */

  .completion-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.9);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .completion-overlay.visible { display: flex; }

  .completion-icon { font-size: 64px; }

  .completion-title {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .completion-subtitle {
    color: var(--text-secondary);
    font-size: 16px;
  }

  .countdown-text {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 8px;
  }

  /* ── Empty State ────────────────────────────────────────────────────── */

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
  }

  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-text { font-size: 18px; }

  /* ── Responsive ─────────────────────────────────────────────────────── */

  @media (max-width: 768px) {
    .header { padding: 16px; }
    .header-inner { flex-direction: column; align-items: flex-start; }
    .stats { width: 100%; }
    .stat-card { flex: 1; min-width: 70px; padding: 8px 12px; }
    .stat-value { font-size: 22px; }
    .diff-container { grid-template-columns: 1fr; }
    .bulk-actions, .cards-container, .progress-wrapper { padding-left: 16px; padding-right: 16px; }
    .card-header { padding: 16px; }
    .card-actions { padding: 12px 16px; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">&#x1F9E0;</span>
      <h1>Mind<span>Heal</span></h1>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending" style="color:#d29922">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-approved" style="color:#3fb950">0</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-rejected" style="color:#f85149">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>
  </div>
</header>

<!-- ── Progress Bar ────────────────────────────────────────────────────── -->

<div class="progress-wrapper">
  <div class="progress-header">
    <span class="progress-text" id="progress-text">Review progress: 0%</span>
    <span class="progress-text" id="progress-count">0 / 0 reviewed</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<!-- ── Bulk Actions ────────────────────────────────────────────────────── -->

<div class="bulk-actions">
  <button class="btn btn-approve" onclick="bulkAction('approve-all')">&#x2713; Approve All</button>
  <button class="btn btn-reject" onclick="bulkAction('reject-all')">&#x2717; Reject All</button>
  <button class="btn btn-confidence" onclick="bulkAction('approve-high-confidence')">&#x26A1; Approve High Confidence (&gt;0.9)</button>
</div>

<!-- ── Cards ───────────────────────────────────────────────────────────── -->

<div class="cards-container" id="cards-container">
  <div class="empty-state" id="empty-state">
    <div class="empty-state-icon">&#x1F50D;</div>
    <div class="empty-state-text">Loading healing events...</div>
  </div>
</div>

<!-- ── Toast Container ─────────────────────────────────────────────────── -->

<div class="toast-container" id="toast-container"></div>

<!-- ── Completion Overlay ──────────────────────────────────────────────── -->

<div class="completion-overlay" id="completion-overlay">
  <div class="completion-icon">&#x2705;</div>
  <div class="completion-title">Review Complete</div>
  <div class="completion-subtitle" id="completion-subtitle">All healing events have been reviewed.</div>
  <div class="countdown-text" id="countdown-text"></div>
</div>

<script>
(function () {
  'use strict';

  // ── Config injected by server ──────────────────────────────────────

  var WS_PORT = '{{WS_PORT}}';
  var AUTO_CLOSE = '{{AUTO_CLOSE}}' === 'true';

  // ── State ──────────────────────────────────────────────────────────

  var events = [];
  var ws = null;

  // ── Init ───────────────────────────────────────────────────────────

  function init() {
    connectWebSocket();
    loadEvents();
  }

  // ── WebSocket ──────────────────────────────────────────────────────

  function connectWebSocket() {
    var url = 'ws://localhost:' + WS_PORT;
    ws = new WebSocket(url);

    ws.onopen = function () {
      console.log('WebSocket connected');
    };

    ws.onmessage = function (e) {
      var msg = JSON.parse(e.data);

      if (msg.type === 'init') {
        events = msg.events;
        updateSummary(msg.summary);
        renderCards();
      } else if (msg.type === 'update') {
        var idx = events.findIndex(function (ev) { return ev.id === msg.event.id; });
        if (idx !== -1) events[idx] = msg.event;
        updateSummary(msg.summary);
        updateCard(msg.event);
      } else if (msg.type === 'all-reviewed') {
        updateSummary(msg.summary);
        showCompletion();
      }
    };

    ws.onclose = function () {
      console.log('WebSocket disconnected, reconnecting in 2s...');
      setTimeout(connectWebSocket, 2000);
    };
  }

  // ── HTTP Fetch ─────────────────────────────────────────────────────

  function loadEvents() {
    fetch('/api/heals')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        events = data;
        renderCards();
        return fetch('/api/summary');
      })
      .then(function (r) { return r.json(); })
      .then(function (summary) {
        updateSummary(summary);
      })
      .catch(function (err) {
        console.error('Failed to load events', err);
      });
  }

  // ── Summary & Progress ─────────────────────────────────────────────

  function updateSummary(summary) {
    animateCounter('stat-total', summary.total);
    animateCounter('stat-pending', summary.pending);
    animateCounter('stat-approved', summary.approved);
    animateCounter('stat-rejected', summary.rejected);

    var reviewed = summary.approved + summary.rejected;
    var pct = summary.total > 0 ? Math.round((reviewed / summary.total) * 100) : 0;

    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = 'Review progress: ' + pct + '%';
    document.getElementById('progress-count').textContent = reviewed + ' / ' + summary.total + ' reviewed';
  }

  function animateCounter(id, target) {
    var el = document.getElementById(id);
    var current = parseInt(el.textContent, 10) || 0;
    if (current === target) return;

    var step = target > current ? 1 : -1;
    var duration = 300;
    var steps = Math.abs(target - current);
    var interval = Math.max(Math.floor(duration / steps), 20);

    var timer = setInterval(function () {
      current += step;
      el.textContent = current;
      if (current === target) clearInterval(timer);
    }, interval);
  }

  // ── Render Cards ───────────────────────────────────────────────────

  function renderCards() {
    var container = document.getElementById('cards-container');

    if (events.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-state-icon">&#x1F343;</div>' +
          '<div class="empty-state-text">No healing events to review</div>' +
        '</div>';
      return;
    }

    container.innerHTML = '';
    events.forEach(function (ev) {
      container.appendChild(buildCard(ev));
    });
  }

  function buildCard(ev) {
    var card = document.createElement('div');
    card.className = 'heal-card ' + ev.reviewStatus;
    card.id = 'card-' + ev.id;

    var originalExpr = ev.originalLocator ? ev.originalLocator.playwrightExpression : 'N/A';
    var healedExpr = ev.healedLocator ? ev.healedLocator.playwrightExpression : 'N/A';

    var filePath = '';
    var fileLink = '';
    if (ev.sourceLocation) {
      filePath = ev.sourceLocation.filePath + ':' + ev.sourceLocation.line;
      fileLink = 'vscode://file/' + ev.sourceLocation.filePath + ':' + ev.sourceLocation.line + ':' + ev.sourceLocation.column;
    }

    var confClass = ev.confidence > 0.9 ? 'badge-confidence-high' :
                    ev.confidence > 0.7 ? 'badge-confidence-mid' : 'badge-confidence-low';

    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-meta">' +
          (filePath ? '<div class="card-file">&#x1F4C4; <a href="' + escapeAttr(fileLink) + '">' + escapeHtml(filePath) + '</a></div>' : '') +
          '<div class="card-title">' + escapeHtml(ev.testTitle) + ' &mdash; ' + escapeHtml(ev.action) + '</div>' +
        '</div>' +
        '<div class="card-badges">' +
          '<span class="badge ' + confClass + '">' + (ev.confidence * 100).toFixed(0) + '% confidence</span>' +
          (ev.strategy ? '<span class="badge badge-strategy">' + escapeHtml(ev.strategy) + '</span>' : '') +
          '<span class="badge badge-status ' + ev.reviewStatus + '">' + ev.reviewStatus + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="diff-section">' +
        '<div class="diff-container">' +
          '<div class="diff-panel">' +
            '<div class="diff-label">Original</div>' +
            '<div class="diff-original">' + escapeHtml(originalExpr) + '</div>' +
          '</div>' +
          '<div class="diff-panel">' +
            '<div class="diff-label">Healed</div>' +
            '<div class="diff-healed">' + escapeHtml(healedExpr) + '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-details">' +
        '<button class="details-toggle" onclick="toggleDetails(this)">' +
          '<span class="arrow">&#x25B6;</span> Details &amp; Context' +
        '</button>' +
        '<div class="details-content">' +
          '<div class="detail-row"><span class="detail-label">Page URL</span><span class="detail-value">' + escapeHtml(ev.pageUrl) + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Test File</span><span class="detail-value">' + escapeHtml(ev.testFile) + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">Duration</span><span class="detail-value">' + ev.duration + ' ms</span></div>' +
          '<div class="detail-row"><span class="detail-label">Reasoning</span><span class="detail-value">' + escapeHtml(ev.reasoning) + '</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-actions" id="actions-' + ev.id + '">' +
        '<button class="btn btn-sm btn-solid-approve" onclick="approveEvent(\'' + ev.id + '\')">&#x2713; Approve</button>' +
        '<button class="btn btn-sm btn-solid-reject" onclick="rejectEvent(\'' + ev.id + '\')">&#x2717; Reject</button>' +
        '<button class="btn btn-sm btn-solid-edit" onclick="startEdit(\'' + ev.id + '\')">&#x270E; Edit</button>' +
        '<div class="edit-input-wrapper" id="edit-wrapper-' + ev.id + '">' +
          '<input class="edit-input" id="edit-input-' + ev.id + '" value="' + escapeAttr(healedExpr) + '" placeholder="Enter new locator..." />' +
          '<button class="btn btn-sm btn-solid-approve" onclick="confirmEdit(\'' + ev.id + '\')">Save</button>' +
          '<button class="btn btn-sm" onclick="cancelEdit(\'' + ev.id + '\')">Cancel</button>' +
        '</div>' +
        '<div class="spacer"></div>' +
      '</div>';

    return card;
  }

  function updateCard(ev) {
    var existing = document.getElementById('card-' + ev.id);
    if (!existing) return;
    var newCard = buildCard(ev);
    existing.replaceWith(newCard);
  }

  // ── Toggle Details ─────────────────────────────────────────────────

  window.toggleDetails = function (btn) {
    btn.classList.toggle('open');
    var content = btn.nextElementSibling;
    content.classList.toggle('open');
  };

  // ── Actions ────────────────────────────────────────────────────────

  window.approveEvent = function (id) {
    fetch('/api/heals/' + id + '/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(function (r) { return r.json(); })
      .then(function () { showToast('Event approved', 'success'); })
      .catch(function () { showToast('Failed to approve', 'error'); });
  };

  window.rejectEvent = function (id) {
    fetch('/api/heals/' + id + '/reject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(function (r) { return r.json(); })
      .then(function () { showToast('Event rejected', 'success'); })
      .catch(function () { showToast('Failed to reject', 'error'); });
  };

  window.startEdit = function (id) {
    var wrapper = document.getElementById('edit-wrapper-' + id);
    wrapper.classList.add('active');
    document.getElementById('edit-input-' + id).focus();
  };

  window.cancelEdit = function (id) {
    document.getElementById('edit-wrapper-' + id).classList.remove('active');
  };

  window.confirmEdit = function (id) {
    var input = document.getElementById('edit-input-' + id);
    var value = input.value.trim();
    if (!value) return;

    fetch('/api/heals/' + id + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ editedLocator: value })
    })
      .then(function (r) { return r.json(); })
      .then(function () {
        document.getElementById('edit-wrapper-' + id).classList.remove('active');
        showToast('Event approved with edits', 'success');
      })
      .catch(function () { showToast('Failed to save edit', 'error'); });
  };

  window.bulkAction = function (action) {
    fetch('/api/' + action, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        showToast(data.updated + ' events updated', 'success');
        loadEvents();
      })
      .catch(function () { showToast('Bulk action failed', 'error'); });
  };

  // ── Toast ──────────────────────────────────────────────────────────

  function showToast(message, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function () { toast.remove(); }, 3000);
  }

  // ── Completion ─────────────────────────────────────────────────────

  function showCompletion() {
    var overlay = document.getElementById('completion-overlay');
    overlay.classList.add('visible');

    var approved = events.filter(function (e) { return e.reviewStatus === 'approved'; }).length;
    var rejected = events.filter(function (e) { return e.reviewStatus === 'rejected'; }).length;
    document.getElementById('completion-subtitle').textContent =
      approved + ' approved, ' + rejected + ' rejected out of ' + events.length + ' total heals.';

    if (AUTO_CLOSE) {
      var countdown = 5;
      var countdownEl = document.getElementById('countdown-text');
      countdownEl.textContent = 'Auto-closing in ' + countdown + 's...';

      var timer = setInterval(function () {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          countdownEl.textContent = 'Closing...';
        } else {
          countdownEl.textContent = 'Auto-closing in ' + countdown + 's...';
        }
      }, 1000);
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Start ──────────────────────────────────────────────────────────

  init();
})();
</script>
</body>
</html>
