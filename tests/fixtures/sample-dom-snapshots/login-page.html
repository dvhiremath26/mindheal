<div id="app">
  <form class="login-form" data-testid="login-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" data-testid="email-input" placeholder="Enter your email" aria-label="Email Address" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" data-testid="password-input" placeholder="Enter your password" />
    </div>
    <button type="submit" class="btn btn-primary" data-testid="login-button" aria-label="Sign in to your account">
      Sign In
    </button>
    <a href="/forgot-password" class="forgot-link" data-testid="forgot-password-link">Forgot Password?</a>
  </form>
</div>
